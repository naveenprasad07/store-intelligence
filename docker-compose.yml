services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - VIDEO_DIR=/app/videos
      - LOG_LEVEL=INFO
    volumes:
      - ./videos:/app/videos:ro
      - ./store_layout.json:/app/store_layout.json:ro
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  detector:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
      - VIDEO_DIR=/app/videos
      - LOG_LEVEL=INFO
    volumes:
      - ./videos:/app/videos:ro
      - ./store_layout.json:/app/store_layout.json:ro
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: python -m detection.pipeline